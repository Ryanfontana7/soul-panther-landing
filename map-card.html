<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@100;200;300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1080px; height:1460px; background:#060504; }
  svg text { font-family:'Raleway', sans-serif; }
</style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1460" width="1080" height="1460" role="img" aria-label="The Creativity Map: a 2x2 of Soul versus Quality">
    <defs>
      <linearGradient id="bgm" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#12100D"/>
        <stop offset="0.55" stop-color="#0A0907"/>
        <stop offset="1" stop-color="#060504"/>
      </linearGradient>
      <radialGradient id="emberm" gradientUnits="userSpaceOnUse" cx="725" cy="600" r="780">
        <stop offset="0" stop-color="#c4a35a" stop-opacity="0.30"/>
        <stop offset="0.38" stop-color="#8a6632" stop-opacity="0.12"/>
        <stop offset="0.72" stop-color="#4a3a1a" stop-opacity="0.04"/>
        <stop offset="1" stop-color="#000000" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="halom" gradientUnits="userSpaceOnUse" cx="725" cy="615" r="220">
        <stop offset="0" stop-color="#dbb96a" stop-opacity="0.18"/>
        <stop offset="0.6" stop-color="#dbb96a" stop-opacity="0.05"/>
        <stop offset="1" stop-color="#dbb96a" stop-opacity="0"/>
      </radialGradient>
    </defs>

    <rect x="0" y="0" width="1080" height="1460" fill="url(#bgm)"/>
    <rect x="0" y="0" width="1080" height="1460" fill="url(#emberm)"/>

    <!-- Title block -->
    <text x="540" y="128" text-anchor="middle" font-size="19" font-weight="500" letter-spacing="7" fill="#c9a85f">A FRAMEWORK FOR CREATIVE VALUE</text>
    <text x="540" y="198" text-anchor="middle" font-size="56" font-weight="200" letter-spacing="6" fill="#e3c479">THE CREATIVITY MAP</text>
    <text x="540" y="250" text-anchor="middle" font-size="24" font-weight="300" fill="#b8b2a6">A model for all music — no matter who made it, or how</text>

    <!-- Halo behind The Real Thing quadrant -->
    <circle cx="725" cy="615" r="225" fill="url(#halom)"/>
    <circle cx="725" cy="615" r="150" fill="none" stroke="#dbb96a" stroke-opacity="0.12" stroke-width="1"/>
    <circle cx="725" cy="615" r="195" fill="none" stroke="#dbb96a" stroke-opacity="0.07" stroke-width="1"/>

    <!-- Grid -->
    <rect x="170" y="430" width="740" height="740" rx="8" fill="none" stroke="#e4e0d5" stroke-opacity="0.24" stroke-width="1.5"/>
    <line x1="540" y1="430" x2="540" y2="1170" stroke="#c4a35a" stroke-opacity="0.34" stroke-width="1.4"/>
    <line x1="170" y1="800" x2="910" y2="800" stroke="#c4a35a" stroke-opacity="0.34" stroke-width="1.4"/>

    <!-- TOP-LEFT: LOW SOUL · HIGH QUALITY -->
    <text x="355" y="566" text-anchor="middle" font-size="15" font-weight="400" letter-spacing="3" fill="#8f897c">LOW SOUL · HIGH QUALITY</text>
    <text x="355" y="624" text-anchor="middle" font-size="38" font-weight="200" fill="#cfc8ba">The Hollow</text>
    <text x="355" y="660" text-anchor="middle" font-size="20" font-weight="300" fill="#9a948a">polished, but empty</text>

    <!-- TOP-RIGHT: HIGH SOUL · HIGH QUALITY (the hero) -->
    <text x="725" y="566" text-anchor="middle" font-size="15" font-weight="500" letter-spacing="3" fill="#c9a85f">HIGH SOUL · HIGH QUALITY</text>
    <text x="725" y="626" text-anchor="middle" font-size="42" font-weight="200" fill="#e3c479">The Real Thing</text>
    <text x="725" y="662" text-anchor="middle" font-size="20" font-weight="300" fill="#d8c79a">soul, fully realized</text>

    <!-- BOTTOM-LEFT: LOW SOUL · LOW QUALITY -->
    <text x="355" y="936" text-anchor="middle" font-size="15" font-weight="400" letter-spacing="3" fill="#7d7869">LOW SOUL · LOW QUALITY</text>
    <text x="355" y="994" text-anchor="middle" font-size="38" font-weight="200" fill="#928c80">Filler</text>
    <text x="355" y="1030" text-anchor="middle" font-size="20" font-weight="300" fill="#85806f">nothing there</text>

    <!-- BOTTOM-RIGHT: HIGH SOUL · LOW QUALITY -->
    <text x="725" y="936" text-anchor="middle" font-size="15" font-weight="400" letter-spacing="3" fill="#a9863f">HIGH SOUL · LOW QUALITY</text>
    <text x="725" y="994" text-anchor="middle" font-size="38" font-weight="200" fill="#d8b566">The Seed</text>
    <text x="725" y="1030" text-anchor="middle" font-size="20" font-weight="300" fill="#bda062">true, but still raw</text>

    <!-- Axis labels -->
    <text x="104" y="800" text-anchor="middle" font-size="23" font-weight="400" letter-spacing="5" fill="#e4e0d5" transform="rotate(-90 104 800)">QUALITY</text>
    <text x="150" y="456" text-anchor="end" font-size="16" font-weight="400" letter-spacing="2" fill="#b0aa9e">HIGH</text>
    <text x="150" y="1164" text-anchor="end" font-size="16" font-weight="400" letter-spacing="2" fill="#b0aa9e">LOW</text>
    <text x="540" y="1258" text-anchor="middle" font-size="23" font-weight="400" letter-spacing="5" fill="#e4e0d5">SOUL</text>
    <text x="176" y="1216" text-anchor="start" font-size="16" font-weight="400" letter-spacing="2" fill="#b0aa9e">LOW</text>
    <text x="904" y="1216" text-anchor="end" font-size="16" font-weight="400" letter-spacing="2" fill="#b0aa9e">HIGH</text>

    <!-- Footer note -->
    <text x="540" y="1340" text-anchor="middle" font-size="22" font-weight="400" fill="#e3c479">AI appears nowhere on this map.</text>
    <text x="540" y="1374" text-anchor="middle" font-size="18" font-weight="300" fill="#b8b2a6">It's a tool you can use at any point on it.</text>
    <text x="540" y="1430" text-anchor="middle" font-size="15" font-weight="500" letter-spacing="6" fill="#b0703a">SOUL PANTHER</text>
  </svg>
</body>
</html>
