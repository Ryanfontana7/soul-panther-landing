<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>* { margin:0; padding:0; } html,body{ width:100%; height:100%; background:#000; overflow:hidden; } canvas{ display:block; width:100vw; height:100vh; }</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<script>
const FRAG = `
precision highp float;
uniform vec2 u_res;
uniform vec2 u_mouse;
uniform float u_time;
uniform vec2 u_click;
uniform float u_click_t;

float hash(vec2 p) {
  p = fract(p * vec2(127.1, 311.7));
  p += dot(p, p + 17.23);
  return fract(p.x * p.y);
}
float noise(vec2 p) {
  vec2 i = floor(p), f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  return mix(
    mix(hash(i),             hash(i + vec2(1.0,0.0)), f.x),
    mix(hash(i + vec2(0.0,1.0)), hash(i + vec2(1.0,1.0)), f.x),
    f.y);
}
float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  mat2 rot = mat2(1.6, 1.2, -1.2, 1.6);
  for (int i = 0; i < 5; i++) { v += a * noise(p); p = rot * p; a *= 0.5; }
  return v;
}
void main() {
  float asp = u_res.x / u_res.y;
  vec2 p   = vec2(gl_FragCoord.x / u_res.y, gl_FragCoord.y / u_res.y);
  vec2 ctr = vec2(asp * 0.5, 0.5);
  vec2 m   = vec2(u_mouse.x * asp, u_mouse.y);
  float T  = u_time * 0.030;
  float md   = length(p - m);
  vec2  moff = (m - p) / (md + 0.01) * 0.14 * exp(-md * 2.8);
  float q1 = fbm(p + T);
  float q2 = fbm(p + vec2(5.2, 1.3) + T * 0.95);
  vec2  q  = vec2(q1, q2) + moff * 0.4;
  float r1 = fbm(p + 2.9*q + vec2(1.7, 9.2) + T*0.88);
  float r2 = fbm(p + 2.9*q + vec2(8.3, 2.8) + T*0.79);
  vec2  wp = p + 2.9*vec2(r1,r2) + moff;
  float f = fbm(wp + T*0.55);
  float eps = 0.007;
  float fx  = fbm(wp + vec2(eps, 0.0) + T*0.55);
  float fy  = fbm(wp + vec2(0.0, eps) + T*0.55);
  vec2  grad = vec2(fx - f, fy - f) / eps;
  float gLen = length(grad);
  float ang  = atan(grad.y, grad.x) / 6.28318 + 0.5 + T*0.06;
  vec3 base = mix(vec3(0.010, 0.005, 0.000), vec3(0.052, 0.024, 0.003), smoothstep(0.28, 0.72, f));
  vec3 iri = vec3(
    0.55 + 0.30*cos(ang*6.28318),
    0.28 + 0.20*cos(ang*6.28318 + 1.20),
    0.04 + 0.06*cos(ang*6.28318 + 3.80));
  float iriStr = smoothstep(0.25, 2.2, gLen) * 0.26;
  vec3 col = base + iri * iriStr;
  float vig = 1.0 - smoothstep(0.28, 1.0, length(p - ctr));
  col *= vig;
  float gn = fract(sin(dot(gl_FragCoord.xy, vec2(12.9898,78.233)))*43758.5453);
  col += (gn - 0.5) * 0.028;
  gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);
}`;

const params = new URLSearchParams(location.search);
const T = parseFloat(params.get('t') || '8');

const canvas = document.getElementById('bg-canvas');
const dpr = parseFloat(params.get('dpr') || '1');
canvas.width  = window.innerWidth  * dpr;
canvas.height = window.innerHeight * dpr;
const gl = canvas.getContext('webgl', { preserveDrawingBuffer: true });
function mk(type, src){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s); return s; }
const prog = gl.createProgram();
gl.attachShader(prog, mk(gl.VERTEX_SHADER, 'attribute vec2 a;void main(){gl_Position=vec4(a,0.,1.);}'));
gl.attachShader(prog, mk(gl.FRAGMENT_SHADER, FRAG));
gl.linkProgram(prog); gl.useProgram(prog);
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const aLoc = gl.getAttribLocation(prog,'a');
gl.enableVertexAttribArray(aLoc);
gl.vertexAttribPointer(aLoc,2,gl.FLOAT,false,0,0);
const U = ['u_res','u_mouse','u_time','u_click','u_click_t'].reduce((o,n)=>{o[n]=gl.getUniformLocation(prog,n);return o;},{});
gl.viewport(0,0,canvas.width,canvas.height);
gl.uniform2f(U.u_res, canvas.width, canvas.height);
gl.uniform2f(U.u_mouse, 0.5, 0.5);
gl.uniform1f(U.u_time, T);
gl.uniform2f(U.u_click, 0.5, 0.5);
gl.uniform1f(U.u_click_t, -1.0);
gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
document.title = 'rendered t=' + T;
</script>
</body>
</html>
